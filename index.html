<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#FFE5EC">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Snowball</title>
<style>
:root{
  /* 主题变量 */
  --primary:#FF8FAB;
  --primary-soft:#FFE5EC;
  --primary-deep:#FF6B95;
  --accent:#B5DEFF;
  --accent-2:#E8D5FF;
  --bg:#FFF8FA;
  --bg-elev:#FFFFFF;
  --bg-frost:rgba(255,255,255,0.72);
  --bg-frost-strong:rgba(255,255,255,0.92);
  --text:#3D2A35;
  --text-soft:#8E7B85;
  --text-mute:#C4B0BB;
  --border:rgba(255,143,171,0.18);
  --shadow-sm:0 2px 8px rgba(255,143,171,0.08);
  --shadow:0 8px 24px rgba(255,143,171,0.12);
  --shadow-lg:0 16px 48px rgba(255,143,171,0.18);
  --r-sm:12px;--r-md:18px;--r-lg:24px;--r-xl:32px;
  --safe-top:env(safe-area-inset-top,44px);
  --safe-bottom:env(safe-area-inset-bottom,16px);
  --status-h:44px; /* 状态栏高度,iPhone标准 */
  --header-h:52px; /* 页面header高度 */
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
input,textarea,[contenteditable]{-webkit-user-select:text;user-select:text}
html,body{height:100%;overflow:hidden;font-family:-apple-system,"SF Pro Display","PingFang SC","Helvetica Neue",sans-serif;background:#000;color:var(--text);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;font-family:inherit}
input,textarea,select{font:inherit;color:inherit;background:none;border:none;outline:none;width:100%;font-family:inherit}
#app{width:100%;height:100%;position:relative;overflow:hidden;background:var(--bg)}

/* ––––– 壁纸层 ––––– */
.wallpaper{position:absolute;inset:0;background:var(–wallpaper-bg,linear-gradient(135deg,#FFE5EC 0%,#FFD1DC 35%,#E8D5FF 70%,#C5E8FF 100%));z-index:0}
.wallpaper.has-img{background:var(–wp-img) center/cover}

/* ––––– 状态栏 ––––– */
.statusbar{position:fixed;top:0;left:0;right:0;height:calc(var(–safe-top));padding:0 24px;display:flex;align-items:center;justify-content:space-between;font-size:15px;font-weight:600;color:#fff;z-index:1000;pointer-events:none;text-shadow:0 1px 2px rgba(0,0,0,.25)}
.statusbar.dark-text{color:var(–text);text-shadow:none}
.statusbar .right{display:flex;align-items:center;gap:5px;font-size:13px}
.statusbar svg{width:22px;height:11px}

/* ––––– 屏幕容器 ––––– */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;background:transparent;will-change:transform;animation:fade .28s cubic-bezier(.32,.72,0,1)}
.screen.app-screen{background:linear-gradient(180deg,var(–primary-soft) 0%,var(–bg) 280px);padding-top:var(–safe-top)}
@keyframes fade{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}

/* ––––– 主屏 ––––– */
.home{position:absolute;top:0;left:0;right:0;bottom:0;z-index:1;display:flex;flex-direction:column;align-items:stretch;padding:calc(var(–safe-top) + 16px) 16px calc(var(–safe-bottom) + 24px);box-sizing:border-box;overflow-y:auto;-webkit-overflow-scrolling:touch}
.home::-webkit-scrollbar{display:none}

/* 时钟小组件 */
.widget-clock{flex-shrink:0;padding:12px 4px 8px;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.25);text-align:center;animation:slideDown .5s cubic-bezier(.32,.72,0,1)}
@keyframes slideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
.widget-clock .date{font-size:14px;font-weight:500;opacity:.92;letter-spacing:.5px;margin-bottom:4px}
.widget-clock .time{font-size:64px;font-weight:200;letter-spacing:-2px;line-height:1;font-feature-settings:“tnum”}
.widget-clock .quote{font-size:13px;opacity:.92;margin-top:14px;font-style:italic;font-weight:400}

.home-grid{flex:0 0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:22px 12px;align-content:start;justify-content:center;padding:32px 12px 0;width:100%;max-width:420px;margin:0 auto}
.app-icon{display:flex;flex-direction:column;align-items:center;gap:7px;animation:pop .5s cubic-bezier(.5,1.6,.5,1) backwards}
.app-icon:nth-child(1){animation-delay:.05s}
.app-icon:nth-child(2){animation-delay:.1s}
.app-icon:nth-child(3){animation-delay:.15s}
.app-icon:nth-child(4){animation-delay:.2s}
.app-icon:nth-child(5){animation-delay:.25s}
.app-icon:nth-child(6){animation-delay:.3s}
.app-icon:nth-child(7){animation-delay:.35s}
.app-icon:nth-child(8){animation-delay:.4s}
@keyframes pop{from{opacity:0;transform:scale(.5) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.app-icon-bg{width:62px;height:62px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px;box-shadow:0 8px 18px rgba(0,0,0,.1),inset 0 1px 0 rgba(255,255,255,.6);transition:transform .15s ease;background-size:cover;background-position:center;position:relative}
.app-icon-bg::after{content:””;position:absolute;inset:0;border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,.22) 0%,transparent 55%);pointer-events:none}
.app-icon:active .app-icon-bg{transform:scale(.92)}
.app-icon-label{font-size:12px;color:#fff;text-shadow:0 1px 5px rgba(0,0,0,.45);font-weight:500;max-width:74px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.3px}

/* ––––– Page Header ––––– */
.page-header{position:sticky;top:0;background:var(–bg-frost-strong);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);height:var(–header-h);padding:0 8px;display:flex;align-items:center;gap:4px;z-index:10;border-bottom:.5px solid var(–border);margin-top:calc(-1 * var(–safe-top));padding-top:0}
.page-header-wrap{position:sticky;top:0;z-index:10;padding-top:var(–safe-top);background:var(–bg-frost-strong);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:.5px solid var(–border)}
.page-header{position:static;background:transparent;backdrop-filter:none;-webkit-backdrop-filter:none;border-bottom:none;margin-top:0}
.page-header .title-wrap{flex:1;text-align:center;min-width:0;padding:0 4px}
.page-header .title{font-size:17px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(–text)}
.page-header .subtitle{font-size:11px;color:var(–text-soft);font-weight:400;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn-icon{width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:50%;color:var(–primary-deep);transition:background .15s,transform .1s;flex-shrink:0}
.btn-icon:active{background:var(–primary-soft);transform:scale(.9)}
.btn-icon svg{width:20px;height:20px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.btn-text{color:var(–primary-deep);font-size:15px;font-weight:500;padding:8px 12px;display:flex;align-items:center;gap:2px;flex-shrink:0}
.btn-text:active{opacity:.5}
.btn-text svg{width:16px;height:16px;stroke:currentColor;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round;margin-right:-2px}

.page-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page-body::-webkit-scrollbar{display:none}

/* ––––– 通用 List / Section ––––– */
.section{padding:18px 18px 6px;font-size:12px;color:var(–text-soft);text-transform:uppercase;letter-spacing:.6px;font-weight:600}
.list{background:var(–bg-elev);border-radius:var(–r-md);margin:0 14px;overflow:hidden;box-shadow:var(–shadow-sm)}
.list-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:.5px solid var(–border);min-height:52px;transition:background .12s}
.list-item:last-child{border-bottom:none}
.list-item:active{background:var(–primary-soft)}
.list-item .li-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(–primary-soft);color:var(–primary-deep);flex-shrink:0}
.list-item .li-main{flex:1;min-width:0;font-size:15px;color:var(–text)}
.list-item .li-sub{font-size:12px;color:var(–text-mute);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-item .li-right{font-size:14px;color:var(–text-mute);display:flex;align-items:center;gap:6px;flex-shrink:0;max-width:55%;justify-content:flex-end}
.list-item .li-right .arrow{opacity:.5;font-size:18px}
.list-item .li-right input{text-align:right}
.list-item input[type=“text”],.list-item input[type=“password”]{flex:1;text-align:right;font-size:14px;color:var(–text-soft)}

/* ––––– 按钮 ––––– */
.btn-primary{background:var(–primary-deep);color:#fff;padding:12px 22px;border-radius:var(–r-md);font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;transition:transform .1s,opacity .15s}
.btn-primary:active{transform:scale(.97)}
.btn-primary:disabled{opacity:.4}
.btn-secondary{background:var(–primary-soft);color:var(–primary-deep);padding:12px 22px;border-radius:var(–r-md);font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-danger{background:#FFE5E8;color:#E94560;padding:12px 22px;border-radius:var(–r-md);font-size:15px;font-weight:500}
.btn-block{width:calc(100% - 28px);margin:8px 14px}
.btn-ghost{padding:8px 12px;color:var(–primary-deep);font-size:14px;font-weight:500}

/* ––––– Modal ––––– */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);z-index:2000;display:flex;align-items:flex-end;justify-content:center;animation:fadeBg .25s ease}
@keyframes fadeBg{from{opacity:0}to{opacity:1}}
.modal{background:var(–bg);border-radius:24px 24px 0 0;width:100%;max-height:90vh;display:flex;flex-direction:column;animation:slideUp .3s cubic-bezier(.32,.72,0,1);padding-bottom:var(–safe-bottom)}
.modal.center{border-radius:24px;margin:auto;width:calc(100% - 40px);max-width:380px;padding-bottom:0}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:5px;background:var(–text-mute);border-radius:3px;margin:8px auto;opacity:.4}
.modal-head{padding:14px 18px 8px;display:flex;justify-content:space-between;align-items:center}
.modal-title{font-size:17px;font-weight:600;color:var(–text)}
.modal-body{padding:8px 18px 24px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-actions{display:flex;gap:8px;padding:0 18px 18px}

/* ––––– 头像 ––––– */
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;color:#fff;flex-shrink:0;background-size:cover;background-position:center;background-color:var(–primary-deep);font-feature-settings:“tnum”}
.avatar.sm{width:30px;height:30px;font-size:13px}
.avatar.md{width:42px;height:42px;font-size:16px}
.avatar.lg{width:64px;height:64px;font-size:24px}
.avatar.xl{width:96px;height:96px;font-size:36px}

/* ––––– 聊天 ––––– */
.empty{padding:60px 24px;text-align:center;color:var(–text-mute);font-size:14px}
.empty-icon{font-size:52px;margin-bottom:12px;opacity:.5}
.conv-item{display:flex;gap:12px;padding:14px 16px;border-bottom:.5px solid var(–border);align-items:center}
.conv-item:active{background:var(–primary-soft)}
.conv-meta{flex:1;min-width:0}
.conv-title{font-size:15px;font-weight:500;display:flex;justify-content:space-between;gap:8px;align-items:baseline;color:var(–text)}
.conv-title span:first-child{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.conv-time{font-size:12px;color:var(–text-mute);font-weight:400;flex-shrink:0}
.conv-preview{font-size:13px;color:var(–text-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:3px}

.chat-view{display:flex;flex-direction:column;height:100%;background:var(–bg)}
.chat-msgs{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 12px 8px;display:flex;flex-direction:column;gap:14px}
.chat-msgs::-webkit-scrollbar{display:none}
.msg{display:flex;gap:8px;align-items:flex-end;animation:msgIn .25s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.me{flex-direction:row-reverse}
.msg-bubble-wrap{display:flex;flex-direction:column;max-width:80%;gap:3px}
.msg.me .msg-bubble-wrap{align-items:flex-end}
.msg-bubble{padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.5;word-wrap:break-word;white-space:pre-wrap;background:var(–bg-elev);color:var(–text);box-shadow:var(–shadow-sm)}
.msg.me .msg-bubble{background:var(–primary-deep);color:#fff;border-bottom-right-radius:6px}
.msg.ai .msg-bubble{border-bottom-left-radius:6px}
.msg-meta{font-size:10.5px;color:var(–text-mute);padding:0 6px;display:none}
.msg-bubble-wrap.show-meta .msg-meta{display:block}
.msg-error .msg-bubble{background:#FFE5E8;color:#C53154}

.chat-input-area{padding:8px 10px calc(var(–safe-bottom) + 8px);background:var(–bg-frost-strong);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:.5px solid var(–border)}
.chat-input-row{display:flex;align-items:flex-end;gap:8px}
.chat-input{flex:1;min-height:38px;max-height:140px;background:var(–bg-elev);border-radius:20px;padding:9px 14px;font-size:15px;line-height:1.4;border:1px solid var(–border);overflow-y:auto;resize:none;color:var(–text)}
.chat-send{width:38px;height:38px;border-radius:50%;background:var(–primary-deep);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .1s,opacity .15s}
.chat-send:disabled{opacity:.4}
.chat-send:active:not(:disabled){transform:scale(.92)}
.chat-send svg{width:18px;height:18px;stroke:currentColor;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
.chat-toolbar{display:flex;gap:6px;padding:0 4px 8px;align-items:center;flex-wrap:wrap;overflow-x:auto;scrollbar-width:none}
.chat-toolbar::-webkit-scrollbar{display:none}
.chip{padding:5px 11px;background:var(–bg-elev);border-radius:14px;font-size:12px;color:var(–text-soft);display:inline-flex;align-items:center;gap:4px;border:.5px solid var(–border);white-space:nowrap;flex-shrink:0}
.chip:active{background:var(–primary-soft)}
.chip.active{background:var(–primary-soft);color:var(–primary-deep);border-color:var(–primary-deep)}

/* ––––– 输入块 ––––– */
.input-block{background:var(–bg-elev);border-radius:var(–r-md);margin:0 14px;overflow:hidden;box-shadow:var(–shadow-sm)}
.input-row{display:flex;flex-direction:column;padding:10px 14px;border-bottom:.5px solid var(–border)}
.input-row:last-child{border-bottom:none}
.input-row label{font-size:11px;color:var(–text-mute);margin-bottom:3px;font-weight:500;letter-spacing:.3px}
.input-row input,.input-row textarea{font-size:15px;background:none;color:var(–text)}
.input-row textarea{min-height:80px;resize:vertical;line-height:1.5}

.help-text{font-size:12px;color:var(–text-soft);padding:8px 18px;line-height:1.5}

.color-input{display:flex;gap:10px;align-items:center}
.color-input input[type=“color”]{-webkit-appearance:none;width:44px;height:44px;border:none;border-radius:12px;background:none;cursor:pointer;overflow:hidden;padding:0}
.color-input input[type=“color”]::-webkit-color-swatch-wrapper{padding:0}
.color-input input[type=“color”]::-webkit-color-swatch{border:none;border-radius:12px}

/* 加载点 */
.loading-dots{display:inline-flex;gap:3px;align-items:center;padding:4px 8px}
.loading-dots span{width:6px;height:6px;border-radius:50%;background:var(–text-mute);animation:dot 1.4s infinite}
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,60%,100%{opacity:.3;transform:scale(.7)}30%{opacity:1;transform:scale(1)}}

.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(–primary-soft);border-top-color:var(–primary-deep);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
.toast{position:fixed;top:calc(var(–safe-top) + 10px);left:50%;transform:translateX(-50%);background:rgba(0,0,0,.78);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:5000;animation:toastIn .25s ease;backdrop-filter:blur(8px);max-width:80vw;text-align:center}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,-10px)}to{opacity:1;transform:translate(-50%,0)}}

/* Channel card */
.channel-card{background:var(–bg-elev);border-radius:var(–r-md);margin:8px 14px;padding:14px;box-shadow:var(–shadow-sm);position:relative}
.channel-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}
.channel-name{font-size:15px;font-weight:600;color:var(–text);display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.channel-name .ch-emoji{font-size:18px;flex-shrink:0}
.channel-name .ch-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.channel-meta{display:flex;gap:8px;font-size:12px;color:var(–text-soft);flex-wrap:wrap}
.channel-meta-item{padding:2px 8px;background:var(–primary-soft);color:var(–primary-deep);border-radius:8px;font-weight:500}
.channel-status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(–text-soft);margin-top:6px}
.channel-status .dot{width:6px;height:6px;border-radius:50%;background:var(–text-mute)}
.channel-status.ok .dot{background:#34C759}
.channel-status.err .dot{background:#FF3B30}

/* select */
select{font:inherit;color:inherit;background:var(–bg-elev);border:.5px solid var(–border);border-radius:10px;padding:8px 30px 8px 12px;font-size:14px;-webkit-appearance:none;appearance:none;background-image:url(“data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 8' fill='%23999'><path d='M6 8L0 0h12z'/></svg>”);background-repeat:no-repeat;background-position:right 10px center;background-size:10px;width:100%}

/* range */
input[type=“range”]{-webkit-appearance:none;width:100%;height:4px;background:var(–primary-soft);border-radius:2px;outline:none}
input[type=“range”]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;background:var(–primary-deep);border-radius:50%;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.15)}

.hidden{display:none !important}

/* Stat card */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 14px}
.stat-card{background:var(–bg-elev);border-radius:var(–r-md);padding:14px;box-shadow:var(–shadow-sm)}
.stat-card .label{font-size:12px;color:var(–text-soft);font-weight:500;letter-spacing:.3px}
.stat-card .value{font-size:24px;font-weight:700;color:var(–text);margin-top:4px;font-feature-settings:“tnum”}
.stat-card .sub{font-size:11px;color:var(–text-mute);margin-top:2px}

/* ––––– 日记app ––––– */
.journal-list{padding:8px 12px}
.journal-card{background:var(–bg-elev);border-radius:var(–r-md);padding:14px 16px;margin-bottom:10px;box-shadow:var(–shadow-sm);transition:transform .1s}
.journal-card:active{transform:scale(.98)}
.journal-card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:8px}
.journal-card-title{font-size:15px;font-weight:600;color:var(–text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.journal-card-mood{font-size:18px;flex-shrink:0}
.journal-card-preview{font-size:13px;color:var(–text-soft);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.journal-card-meta{display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:11px;color:var(–text-mute)}
.journal-card-tag{display:inline-block;padding:2px 8px;background:var(–primary-soft);color:var(–primary-deep);border-radius:8px;font-size:11px;font-weight:500;margin-right:4px}
.journal-card-ai-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;background:linear-gradient(135deg,#E8D5FF,#FFB3C6);color:#fff;border-radius:8px;font-size:10.5px;font-weight:600}

.journal-edit-meta{display:flex;gap:10px;flex-wrap:wrap;padding:0 16px 8px;align-items:center}
.mood-picker{display:flex;gap:6px;flex-wrap:wrap}
.mood-btn{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;background:var(–bg-elev);border:1.5px solid transparent;transition:transform .1s,border-color .1s}
.mood-btn:active{transform:scale(.92)}
.mood-btn.active{border-color:var(–primary-deep);background:var(–primary-soft)}

.journal-content{padding:14px 16px;background:var(–bg-elev);min-height:300px;font-size:15px;line-height:1.7;color:var(–text);border:none;outline:none;resize:none;width:100%;font-family:inherit}
.journal-title-input{padding:14px 16px 4px;background:var(–bg-elev);font-size:18px;font-weight:600;color:var(–text);border:none;outline:none;width:100%;font-family:inherit}

.gen-modal-content{padding:0}
.gen-loading{padding:36px 24px;text-align:center}
.gen-loading-icon{font-size:42px;animation:floatHeart 2s ease-in-out infinite;display:inline-block;margin-bottom:12px}
@keyframes floatHeart{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-8px) rotate(5deg)}}
.gen-loading-text{font-size:15px;color:var(–text-soft);margin-bottom:8px}
.gen-loading-sub{font-size:12px;color:var(–text-mute)}
.gen-progress{margin-top:16px;height:3px;background:var(–primary-soft);border-radius:2px;overflow:hidden}
.gen-progress-bar{height:100%;background:linear-gradient(90deg,var(–primary),var(–primary-deep));width:30%;animation:progressShimmer 1.4s ease-in-out infinite}
@keyframes progressShimmer{0%{transform:translateX(-100%);width:30%}50%{width:60%}100%{transform:translateX(330%);width:30%}}

.bg-task-toast{position:fixed;bottom:calc(var(–safe-bottom) + 16px);left:16px;right:16px;background:var(–bg-elev);border-radius:var(–r-md);padding:12px 16px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:1500;display:flex;align-items:center;gap:10px;animation:taskIn .3s cubic-bezier(.32,.72,0,1)}
@keyframes taskIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.bg-task-icon{width:32px;height:32px;border-radius:50%;background:var(–primary-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.bg-task-content{flex:1;min-width:0}
.bg-task-title{font-size:14px;font-weight:600;color:var(–text)}
.bg-task-sub{font-size:12px;color:var(–text-soft);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bg-task-btn{padding:6px 12px;background:var(–primary-deep);color:#fff;border-radius:14px;font-size:13px;font-weight:500;flex-shrink:0}

/* ––––– 聊天app底部Tab栏 ––––– */
.app-tabbar{display:flex;background:var(–bg-frost-strong);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:.5px solid var(–border);padding:6px 8px calc(var(–safe-bottom) + 6px)}
.app-tabbar .tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;border-radius:10px;color:var(–text-mute);transition:color .15s,background .15s}
.app-tabbar .tab-btn.active{color:var(–primary-deep)}
.app-tabbar .tab-btn:active{background:var(–primary-soft)}
.app-tabbar .tab-icon{font-size:22px;line-height:1}
.app-tabbar .tab-label{font-size:10.5px;font-weight:500}

/* ––––– 朋友圈 ––––– */
.moments-list{padding:8px 0 16px}
.moment-card{background:var(–bg-elev);padding:14px 16px 4px;margin-bottom:1px;border-bottom:.5px solid var(–border)}
.moment-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.moment-author{font-size:14px;font-weight:600;color:var(–primary-deep);flex:1}
.moment-time{font-size:11.5px;color:var(–text-mute)}
.moment-content{font-size:15px;line-height:1.55;color:var(–text);white-space:pre-wrap;word-break:break-word;margin-bottom:10px}
.moment-images{display:grid;gap:4px;margin-bottom:10px}
.moment-images.n1{grid-template-columns:1fr;max-width:240px}
.moment-images.n2,.moment-images.n4{grid-template-columns:1fr 1fr;max-width:280px}
.moment-images.n3,.moment-images.n5,.moment-images.n6,.moment-images.n7,.moment-images.n8,.moment-images.n9{grid-template-columns:1fr 1fr 1fr}
.moment-img{aspect-ratio:1;border-radius:8px;background:var(–primary-soft) center/cover no-repeat;cursor:pointer}
.moment-actions{display:flex;gap:14px;font-size:12px;color:var(–text-soft);padding:6px 0}
.moment-action{display:flex;align-items:center;gap:4px}
.moment-action:active{color:var(–primary-deep)}
.moment-comments{background:var(–primary-soft);border-radius:10px;padding:8px 12px;margin:6px 0 10px;font-size:13px;line-height:1.55}
.moment-comment{padding:3px 0;color:var(–text);word-break:break-word}
.moment-comment .commenter{color:var(–primary-deep);font-weight:600;margin-right:4px}
.moment-comment.pending{color:var(–text-mute);font-style:italic}
.moment-comment.error{color:#C53154}

/* 发动态页 */
.moment-edit-content{padding:16px;background:var(–bg-elev);min-height:180px;font-size:15px;line-height:1.7;color:var(–text);border:none;outline:none;resize:none;width:100%;font-family:inherit}
.moment-edit-images{padding:0 16px 16px;display:flex;flex-wrap:wrap;gap:8px}
.moment-img-thumb{width:80px;height:80px;border-radius:10px;background:var(–primary-soft) center/cover no-repeat;position:relative}
.moment-img-thumb .remove{position:absolute;top:-6px;right:-6px;width:22px;height:22px;border-radius:50%;background:#E94560;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;line-height:1;cursor:pointer}
.add-img-btn{width:80px;height:80px;border-radius:10px;background:var(–primary-soft);display:flex;align-items:center;justify-content:center;font-size:32px;color:var(–primary-deep);cursor:pointer;border:1.5px dashed var(–primary)}

/* ––––– 倒数日 ––––– */
.countdown-list{padding:12px}
.countdown-card{background:var(–bg-elev);border-radius:var(–r-md);padding:18px 20px;margin-bottom:12px;box-shadow:var(–shadow-sm);display:flex;align-items:center;gap:14px;position:relative;overflow:hidden;transition:transform .1s}
.countdown-card:active{transform:scale(.98)}
.countdown-card.pinned{background:linear-gradient(135deg,var(–primary-soft) 0%,var(–bg-elev) 60%);border:1px solid var(–primary)}
.countdown-card.passed{opacity:.65}
.countdown-emoji{font-size:36px;flex-shrink:0;line-height:1}
.countdown-info{flex:1;min-width:0}
.countdown-title{font-size:15px;font-weight:600;color:var(–text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.countdown-date{font-size:12px;color:var(–text-soft);margin-top:2px}
.countdown-days{flex-shrink:0;text-align:right;font-feature-settings:“tnum”}
.countdown-days .num{font-size:32px;font-weight:700;color:var(–primary-deep);line-height:1}
.countdown-days .unit{font-size:11px;color:var(–text-soft);margin-top:2px}
.countdown-days .label{font-size:10.5px;color:var(–text-mute);margin-top:2px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.pin-badge{position:absolute;top:8px;right:8px;font-size:11px;color:var(–primary-deep)}

/* ––––– 全局记忆 ––––– */
.memory-card{background:var(–bg-elev);border-radius:var(–r-md);padding:14px 16px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start;box-shadow:var(–shadow-sm)}
.memory-card.ai{background:linear-gradient(135deg,var(–primary-soft) 0%,var(–bg-elev) 70%)}
.memory-source{flex-shrink:0;font-size:14px;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(–primary-soft);color:var(–primary-deep);margin-top:2px}
.memory-text{flex:1;font-size:14px;line-height:1.55;color:var(–text);word-break:break-word}
.memory-meta{font-size:11px;color:var(–text-mute);margin-top:6px}
.memory-empty-tip{padding:30px 24px;text-align:center;color:var(–text-mute);font-size:13px;line-height:1.7}

.memory-suggest-modal .sugg-item{padding:10px 12px;background:var(–primary-soft);border-radius:10px;margin-bottom:8px;font-size:14px;line-height:1.5;display:flex;gap:10px;align-items:flex-start}
.sugg-checkbox{width:22px;height:22px;border-radius:50%;border:2px solid var(–primary);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s}
.sugg-checkbox.checked{background:var(–primary-deep);border-color:var(–primary-deep);color:#fff}
.sugg-checkbox.checked::after{content:“✓”;font-size:14px;font-weight:bold}

/* ––––– 模拟天气小组件(主屏) ––––– */
.weather-line{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;background:rgba(255,255,255,.18);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-radius:14px;font-size:13px;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.35);margin-top:8px;cursor:pointer;transition:transform .1s,background .15s}
.weather-line:active{transform:scale(.96);background:rgba(255,255,255,.28)}
.weather-line .ico{font-size:14px}

/* ––––– 抽卡运势 ––––– */
.fortune-page{padding:0}
.fortune-empty{padding:50px 24px 32px;text-align:center}
.fortune-empty .big-emoji{font-size:64px;margin-bottom:14px;display:inline-block;animation:fortuneFloat 3s ease-in-out infinite}
@keyframes fortuneFloat{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-8px) rotate(2deg)}}
.fortune-empty .title{font-size:18px;font-weight:600;color:var(–text);margin-bottom:6px}
.fortune-empty .sub{font-size:13px;color:var(–text-soft);line-height:1.6;margin-bottom:24px;max-width:280px;margin-left:auto;margin-right:auto}

.fortune-card{margin:24px 16px;background:linear-gradient(160deg,#FFE5EC 0%,#E8D5FF 50%,#C5E8FF 100%);border-radius:24px;padding:28px 22px;color:#3D2A35;box-shadow:0 12px 30px rgba(255,143,171,.25);position:relative;overflow:hidden;animation:fortuneIn .5s cubic-bezier(.32,.72,0,1)}
@keyframes fortuneIn{from{opacity:0;transform:translateY(16px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.fortune-card::before{content:””;position:absolute;top:-50%;right:-30%;width:200%;height:120%;background:radial-gradient(circle,rgba(255,255,255,.4) 0%,transparent 60%);pointer-events:none}
.fortune-card-date{font-size:12px;color:rgba(61,42,53,.7);margin-bottom:6px;position:relative;font-feature-settings:“tnum”}
.fortune-card-card{font-size:14px;font-weight:600;color:var(–primary-deep);margin-bottom:14px;position:relative;letter-spacing:.5px}
.fortune-card-card .card-emoji{font-size:48px;display:block;margin-bottom:8px;line-height:1}
.fortune-card-content{font-size:15px;line-height:1.75;color:#3D2A35;white-space:pre-wrap;position:relative;word-break:break-word}
.fortune-card-meta{margin-top:18px;display:flex;gap:8px;align-items:center;font-size:11.5px;color:rgba(61,42,53,.65);position:relative}

.fortune-actions{padding:0 16px 16px;display:flex;gap:10px}
.fortune-actions button{flex:1;padding:11px;border-radius:14px;font-size:14px;font-weight:500}
.fortune-draw-btn{padding:14px 28px;background:linear-gradient(135deg,var(–primary) 0%,var(–primary-deep) 100%);color:#fff;border-radius:24px;font-size:15px;font-weight:600;box-shadow:0 6px 18px rgba(255,107,149,.35);transition:transform .1s}
.fortune-draw-btn:active{transform:scale(.95)}
.fortune-draw-btn .ico{margin-right:6px}

.fortune-history-card{background:var(–bg-elev);border-radius:var(–r-md);padding:14px 16px;margin-bottom:8px;box-shadow:var(–shadow-sm)}
.fortune-history-card .date{font-size:12px;color:var(–text-mute);margin-bottom:4px;font-feature-settings:“tnum”}
.fortune-history-card .card{font-size:14px;font-weight:600;color:var(–primary-deep);margin-bottom:6px}
.fortune-history-card .preview{font-size:13px;color:var(–text-soft);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* ––––– 场景推送卡片(主屏顶部) ––––– */
.push-card{margin:0 12px 12px;background:rgba(255,255,255,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:18px;padding:12px 14px;display:flex;gap:10px;align-items:center;box-shadow:0 8px 24px rgba(255,143,171,.18);animation:pushIn .4s cubic-bezier(.32,.72,0,1)}
@keyframes pushIn{from{opacity:0;transform:translateY(-12px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.push-card .push-avatar{flex-shrink:0;width:36px;height:36px;border-radius:50%;background:var(–primary-soft);display:flex;align-items:center;justify-content:center;font-size:18px}
.push-card .push-content{flex:1;min-width:0}
.push-card .push-title{font-size:13px;font-weight:600;color:var(–primary-deep);margin-bottom:2px}
.push-card .push-text{font-size:13px;color:var(–text);line-height:1.45;word-break:break-word}
.push-card .push-close{flex-shrink:0;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(–text-mute);font-size:18px;line-height:1;cursor:pointer}
.push-card .push-close:active{background:var(–primary-soft);color:var(–primary-deep)}

/* ––––– 待办 ––––– */
.todos-list{padding:8px 12px}
.todo-item{background:var(–bg-elev);border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;gap:12px;align-items:center;box-shadow:var(–shadow-sm);transition:opacity .2s}
.todo-item.done{opacity:.55}
.todo-checkbox{width:24px;height:24px;border-radius:50%;border:2px solid var(–primary);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,border-color .15s;background:var(–bg-elev)}
.todo-checkbox.checked{background:var(–primary-deep);border-color:var(–primary-deep)}
.todo-checkbox.checked::after{content:“✓”;color:#fff;font-size:13px;font-weight:bold}
.todo-text{flex:1;font-size:14.5px;line-height:1.5;color:var(–text);word-break:break-word;cursor:pointer}
.todo-item.done .todo-text{text-decoration:line-through;color:var(–text-mute)}
.todos-section-label{padding:8px 18px 6px;font-size:11.5px;color:var(–text-mute);font-weight:500;letter-spacing:.5px}
.todo-add-row{display:flex;gap:8px;padding:0 12px 8px}
.todo-add-input{flex:1;background:var(–bg-elev);border-radius:14px;padding:11px 14px;font-size:14.5px;border:1px solid var(–border);color:var(–text)}
.todo-add-btn{padding:11px 18px;background:var(–primary-deep);color:#fff;border-radius:14px;font-size:14px;font-weight:500;flex-shrink:0}

/* ––––– 喝水 ––––– */
.water-page{padding:0}
.water-hero{padding:24px 16px 16px;text-align:center}
.water-cup-wrap{position:relative;width:200px;height:240px;margin:0 auto 16px}
.water-cup{position:absolute;top:0;left:50%;transform:translateX(-50%);width:160px;height:220px;background:linear-gradient(180deg,rgba(255,255,255,.4) 0%,rgba(255,255,255,.2) 100%);border:3px solid rgba(133,184,255,.5);border-top-left-radius:20px;border-top-right-radius:20px;border-bottom-left-radius:60px;border-bottom-right-radius:60px;overflow:hidden;box-shadow:inset 0 -8px 16px rgba(133,184,255,.15),0 8px 24px rgba(133,184,255,.15)}
.water-fill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(180deg,#A8E6FF 0%,#5EC0FF 60%,#3B9EFF 100%);transition:height .8s cubic-bezier(.32,.72,0,1);overflow:hidden}
.water-fill::before{content:””;position:absolute;top:-6px;left:0;right:0;height:12px;background:linear-gradient(180deg,rgba(255,255,255,.5) 0%,transparent 100%);border-radius:50% / 100%;animation:waterWave 3s ease-in-out infinite alternate}
@keyframes waterWave{from{transform:translateX(-6px)}to{transform:translateX(6px)}}
.water-jellyfish{position:absolute;left:50%;transform:translateX(-50%);font-size:44px;transition:bottom .8s cubic-bezier(.32,.72,0,1);animation:jellyFloat 3.5s ease-in-out infinite;z-index:2;line-height:1}
@keyframes jellyFloat{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-10px)}}
.water-stat{font-size:32px;font-weight:700;color:var(–primary-deep);font-feature-settings:“tnum”;line-height:1.1;margin-top:8px}
.water-stat .small{font-size:18px;color:var(–text-soft);font-weight:400}
.water-sub{font-size:13px;color:var(–text-soft);margin-top:6px}
.water-actions{display:flex;gap:10px;justify-content:center;padding:0 16px 20px}
.water-btn-add{flex:1;max-width:200px;padding:14px;background:linear-gradient(135deg,#A8E6FF 0%,#5EC0FF 100%);color:#fff;border-radius:18px;font-size:16px;font-weight:600;box-shadow:0 6px 18px rgba(94,192,255,.35);transition:transform .1s}
.water-btn-add:active{transform:scale(.95)}
.water-btn-undo{padding:14px 18px;background:var(–bg-elev);color:var(–text-soft);border-radius:18px;font-size:14px;font-weight:500;border:1px solid var(–border)}
.water-history{padding:0 16px}
.water-day-row{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(–bg-elev);border-radius:12px;margin-bottom:6px}
.water-day-date{font-size:13px;color:var(–text);font-feature-settings:“tnum”}
.water-day-bar{flex:1;height:8px;background:var(–primary-soft);border-radius:4px;margin:0 12px;overflow:hidden;position:relative}
.water-day-bar-fill{height:100%;background:linear-gradient(90deg,#A8E6FF,#5EC0FF);border-radius:4px;transition:width .5s}
.water-day-count{font-size:13px;color:var(–primary-deep);font-weight:600;font-feature-settings:“tnum”}

/* ––––– Markdown 渲染 (聊天气泡内) ––––– */
.msg-bubble strong{font-weight:600}
.msg-bubble em{font-style:italic}
.msg-bubble code{font-family:“SF Mono”,“Monaco”,“Consolas”,monospace;font-size:13px;background:rgba(0,0,0,.06);padding:1px 6px;border-radius:5px;color:var(–primary-deep)}
.msg.me .msg-bubble code{background:rgba(255,255,255,.25);color:#fff}
.msg-bubble pre{background:rgba(0,0,0,.05);border-radius:10px;padding:10px 12px;margin:6px 0;overflow-x:auto;font-size:12.5px;line-height:1.5;border:1px solid rgba(0,0,0,.06)}
.msg.me .msg-bubble pre{background:rgba(0,0,0,.18);border-color:rgba(255,255,255,.18)}
.msg-bubble pre code{background:transparent;padding:0;color:inherit;font-size:inherit}
.msg-bubble ul,.msg-bubble ol{margin:6px 0;padding-left:22px}
.msg-bubble li{margin:2px 0;line-height:1.55}
.msg-bubble blockquote{border-left:3px solid var(–primary);padding:2px 10px;margin:6px 0;color:var(–text-soft);font-style:italic;background:rgba(255,143,171,.06);border-radius:0 8px 8px 0}
.msg.me .msg-bubble blockquote{border-left-color:rgba(255,255,255,.7);color:rgba(255,255,255,.85);background:rgba(255,255,255,.1)}
.msg-bubble h1,.msg-bubble h2,.msg-bubble h3{font-weight:600;margin:8px 0 4px;line-height:1.3}
.msg-bubble h1{font-size:18px}
.msg-bubble h2{font-size:16px}
.msg-bubble h3{font-size:15px}
.msg-bubble a{color:var(–primary-deep);text-decoration:underline}
.msg.me .msg-bubble a{color:#fff}
.msg-bubble hr{border:none;border-top:1px solid rgba(0,0,0,.1);margin:8px 0}
.msg-bubble p{margin:0}
.msg-bubble p+p{margin-top:6px}

/* ––––– 梦境 ––––– */
.dream-list{padding:8px 12px}
.dream-card{background:linear-gradient(160deg,#1A1235 0%,#2D1B4E 50%,#3D1B5C 100%);border-radius:18px;padding:16px 18px;margin-bottom:10px;color:#fff;box-shadow:0 6px 18px rgba(74,38,124,.3);position:relative;overflow:hidden}
.dream-card::before{content:””;position:absolute;top:8px;right:12px;font-size:24px;opacity:.3}
.dream-card .dream-time{font-size:11px;color:rgba(255,255,255,.6);margin-bottom:6px;font-feature-settings:“tnum”}
.dream-card .dream-vibe{display:inline-block;padding:2px 8px;background:rgba(255,255,255,.18);border-radius:8px;font-size:11px;margin-bottom:8px;color:#fff}
.dream-card .dream-content{font-size:14px;line-height:1.6;color:rgba(255,255,255,.92);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word}
.dream-card .dream-keywords{margin-top:8px;display:flex;flex-wrap:wrap;gap:5px}
.dream-card .kw-tag{font-size:11px;padding:2px 8px;background:rgba(255,255,255,.12);border-radius:8px;color:rgba(255,255,255,.85)}
.dream-card .ai-tag{display:inline-block;padding:2px 8px;background:linear-gradient(135deg,#E8D5FF,#FFB3C6);color:#3D2A35;border-radius:8px;font-size:10.5px;font-weight:600;margin-top:4px}

.dream-edit-bg{background:linear-gradient(180deg,#1A1235 0%,#2D1B4E 80%);min-height:100%}
.dream-edit-content{padding:16px;background:rgba(255,255,255,.06);min-height:160px;font-size:15px;line-height:1.7;color:#fff;border:none;outline:none;resize:vertical;width:100%;font-family:inherit;border-radius:12px;margin:14px;width:calc(100% - 28px);box-sizing:border-box}
.dream-edit-content::placeholder{color:rgba(255,255,255,.4)}
.dream-section-label{padding:14px 18px 6px;font-size:12px;color:rgba(255,255,255,.65);font-weight:500;letter-spacing:.5px}
.vibe-picker{display:flex;gap:6px;flex-wrap:wrap;padding:0 14px}
.vibe-btn{padding:7px 14px;border-radius:14px;background:rgba(255,255,255,.12);font-size:13px;color:rgba(255,255,255,.8);border:1.5px solid transparent;transition:all .15s}
.vibe-btn.active{background:rgba(255,255,255,.25);color:#fff;border-color:rgba(255,255,255,.4)}

<script>
"use strict";

/* ===================== 工具 ===================== */
const $ = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => [...root.querySelectorAll(sel)];
const h = (tag, props={}, ...children) => {
  const el = document.createElement(tag);
  for (const k in props) {
    if (k === "class") el.className = props[k];
    else if (k === "style" && typeof props[k] === "object") Object.assign(el.style, props[k]);
    else if (k.startsWith("on") && typeof props[k] === "function") el.addEventListener(k.slice(2).toLowerCase(), props[k]);
    else if (k === "html") el.innerHTML = props[k];
    else if (k in el) try { el[k] = props[k]; } catch(e) { el.setAttribute(k, props[k]); }
    else el.setAttribute(k, props[k]);
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    el.appendChild(typeof c === "string" || typeof c === "number" ? document.createTextNode(c) : c);
  }
  return el;
};
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const fmt = (ts) => {
  if (!ts) return "";
  const d = new Date(ts), now = new Date();
  if (d.toDateString() === now.toDateString()) return d.toTimeString().slice(0, 5);
  const yest = new Date(now); yest.setDate(now.getDate() - 1);
  if (d.toDateString() === yest.toDateString()) return "昨天";
  if (now - d < 7 * 24 * 3600 * 1000) return ["周日","周一","周二","周三","周四","周五","周六"][d.getDay()];
  return `${d.getMonth() + 1}/${d.getDate()}`;
};
const escapeHtml = (s) => String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]);

// 简易 Markdown 渲染器 - 安全版,先 escape 再处理
function renderMarkdown(text) {
  if (!text) return "";
  let out = escapeHtml(text);

  // 代码块 ```lang\n...```  (要先处理避免内部被解析)
  const codeBlocks = [];
  out = out.replace(/```([a-zA-Z0-9]*)\n?([\s\S]*?)```/g, (m, lang, code) => {
    const i = codeBlocks.length;
    codeBlocks.push(`<pre><code>${code}</code></pre>`);

```
return `\u0000CODEBLOCK${i}\u0000`;
```

});

// 行内代码 `code`
out = out.replace(/`([^`\n]+)`/g, ‘<code>$1</code>’);

// 标题 # ## ###
out = out.replace(/^### (.+)$/gm, ‘<h3>$1</h3>’);
out = out.replace(/^## (.+)$/gm, ‘<h2>$1</h2>’);
out = out.replace(/^# (.+)$/gm, ‘<h1>$1</h1>’);

// 引用 >
out = out.replace(/^> (.+)$/gm, ‘<blockquote>$1</blockquote>’);
// 合并相邻blockquote
out = out.replace(/</blockquote>\n<blockquote>/g, ‘<br>’);

// 水平线
out = out.replace(/^—+$/gm, ‘<hr>’);

// 加粗 **text** (先处理双星号,留下的单星才会被斜体匹配)
out = out.replace(/**([^*\n]+)**/g, ‘<strong>$1</strong>’);
// 斜体 *text* (Safari 兼容写法,不用 lookbehind)
out = out.replace(/(^|[^*])*([^*\n]+)*(?!*)/g, ‘$1<em>$2</em>’);
// 加粗 **text**
out = out.replace(/**([^_\n]+)**/g, ‘<strong>$1</strong>’);

// 链接 [text](url)
out = out.replace(/[([^]]+)](([^)]+))/g, (m, txt, url) => {
if (!/^https?:///.test(url) && !url.startsWith(”/”)) return m;
return `<a href="${url}" target="_blank" rel="noopener">${txt}</a>`;
});

// 列表 (无序 - * +; 有序 1.)
// 先逐行扫描
const lines = out.split(”\n”);
const result = [];
let listType = null;
let listItems = [];
const flushList = () => {
if (listItems.length > 0) {
const tag = listType === “ol” ? “ol” : “ul”;
result.push(`<${tag}>${listItems.map(x => `<li>${x}</li>`).join("")}</${tag}>`);
listItems = [];
}
listType = null;
};
for (const line of lines) {
const ulMatch = line.match(/^[-*+]\s+(.+)$/);
const olMatch = line.match(/^\d+.\s+(.+)$/);
if (ulMatch) {
if (listType !== “ul”) flushList();
listType = “ul”;
listItems.push(ulMatch[1]);
} else if (olMatch) {
if (listType !== “ol”) flushList();
listType = “ol”;
listItems.push(olMatch[1]);
} else {
flushList();
result.push(line);
}
}
flushList();
out = result.join(”\n”);

// 段落:把连续空行变 <br>
out = out.replace(/\n{2,}/g, “<br><br>”);
out = out.replace(/\n/g, “<br>”);

// 还原代码块占位符
out = out.replace(/\u0000CODEBLOCK(\d+)\u0000/g, (m, i) => codeBlocks[parseInt(i)]);

return out;
}

function toast(msg, duration=2000) {
$$(”.toast”).forEach(t => t.remove());
const t = h(“div”, {class:“toast”}, msg);
document.body.appendChild(t);
setTimeout(() => { t.style.opacity = 0; t.style.transition = “opacity .2s”; setTimeout(() => t.remove(), 200); }, duration);
}

function modal({title, body, actions, size=“sheet”, onClose} = {}) {
const bg = h(“div”, {class:“modal-bg”});
const m = h(“div”, {class:“modal” + (size === “center” ? “ center” : “”)});
if (size === “sheet”) m.appendChild(h(“div”, {class:“modal-handle”}));
if (title) m.appendChild(h(“div”, {class:“modal-head”},
h(“div”, {class:“modal-title”}, title),
h(“button”, {class:“btn-text”, onClick: close}, “完成”)
));
const bodyEl = h(“div”, {class:“modal-body”});
if (typeof body === “string”) bodyEl.innerHTML = body;
else if (body instanceof Node) bodyEl.appendChild(body);
else if (typeof body === “function”) body(bodyEl, close);
m.appendChild(bodyEl);
if (actions) {
const acts = h(“div”, {class:“modal-actions”});
for (const a of actions) {
acts.appendChild(h(“button”, {class: a.danger ? “btn-danger” : (a.primary ? “btn-primary” : “btn-secondary”), style:{flex:1}, onClick: () => { a.onClick && a.onClick(close) }}, a.label));
}
m.appendChild(acts);
}
bg.appendChild(m);
bg.addEventListener(“click”, e => { if (e.target === bg) close(); });
document.body.appendChild(bg);
function close() {
bg.style.opacity = 0; bg.style.transition = “opacity .2s”;
m.style.transform = “translateY(100%)”; m.style.transition = “transform .25s ease”;
setTimeout(() => { bg.remove(); onClose && onClose(); }, 250);
}
return { close, el: m };
}

function confirm({title, message, danger, confirmLabel=“确定”}) {
return new Promise(res => {
modal({size:“center”, title,
body: h(“div”, {style:{padding:“4px 0 16px”,color:“var(–text-soft)”,fontSize:14,lineHeight:1.5}}, message),
actions: [
{label:“取消”, onClick: c => { c(); res(false) }},
{label: confirmLabel, danger, primary: !danger, onClick: c => { c(); res(true) }}
]
});
});
}

function prompt2({title, label, value=””, placeholder=””, multiline=false}) {
return new Promise(res => {
let inputEl;
modal({size:“center”, title,
body: (b, close) => {
if (label) b.appendChild(h(“div”, {style:{fontSize:12,color:“var(–text-soft)”,marginBottom:6,fontWeight:500}}, label));
inputEl = multiline
? h(“textarea”, {placeholder, rows:4, style:{width:“100%”,padding:“10px 12px”,border:“1px solid var(–border)”,borderRadius:“12px”,background:“var(–bg-elev)”,color:“var(–text)”,fontSize:“15px”,fontFamily:“inherit”,resize:“vertical”}}, value)
: h(“input”, {type:“text”, placeholder, value, style:{width:“100%”,padding:“10px 12px”,border:“1px solid var(–border)”,borderRadius:“12px”,background:“var(–bg-elev)”,color:“var(–text)”,fontSize:“15px”}});
b.appendChild(inputEl);
setTimeout(() => inputEl.focus(), 100);
},
actions: [
{label:“取消”, onClick: c => { c(); res(null) }},
{label:“确定”, primary:true, onClick: c => { const v = inputEl.value; c(); res(v) }}
],
onClose: () => res(null)
});
});
}

/* ===================== 存储 ===================== */
const Store = {

data: null,
load() {
try {
const raw = localStorage.getItem(this.KEY);
// 兼容v1的key
const rawV1 = localStorage.getItem(“snowball.v1”);
if (!raw && rawV1) {
// 迁移v1
this.data = this.migrateFromV1(JSON.parse(rawV1));
this.save();
} else {
this.data = raw ? JSON.parse(raw) : this.defaults();
}
const def = this.defaults();
for (const k in def) if (!(k in this.data)) this.data[k] = def[k];
} catch (e) {
console.error(e);
this.data = this.defaults();
}
return this.data;
},

},

},

/* ===================== 主题系统(锁定:奶油马卡龙) ===================== */
const BASE_THEME = {

primary: “#FF8FAB”, primarySoft: “#FFE5EC”, primaryDeep: “#FF6B95”,
accent: “#B5DEFF”, accent2: “#E8D5FF”,

]
};

function applyTheme() {
const t = BASE_THEME;
const root = document.documentElement;

// 应用色板
root.style.setProperty(”–primary”, t.primary);
root.style.setProperty(”–primary-soft”, t.primarySoft);
root.style.setProperty(”–primary-deep”, t.primaryDeep);
root.style.setProperty(”–accent”, t.accent);
root.style.setProperty(”–accent-2”, t.accent2);
root.style.setProperty(”–bg”, t.bg);
root.style.setProperty(”–bg-elev”, t.bgElev);
root.style.setProperty(”–bg-frost”, t.bgFrost);
root.style.setProperty(”–bg-frost-strong”, t.bgFrostStrong);
root.style.setProperty(”–text”, t.text);
root.style.setProperty(”–text-soft”, t.textSoft);
root.style.setProperty(”–text-mute”, t.textMute);
root.style.setProperty(”–border”, t.border);

// theme-color meta
document.querySelector(‘meta[name=“theme-color”]’).setAttribute(“content”, t.primarySoft);

// 壁纸
const wp = $(”#wallpaper”);
const brightness = Store.data.appearance?.wallpaperBrightness ?? 100;
if (Store.data.wallpaper) {
wp.classList.add(“has-img”);
wp.style.backgroundImage = `url(${Store.data.wallpaper})`;
wp.style.backgroundSize = “cover”;
wp.style.backgroundPosition = “center”;
wp.style.background = “”; // 清掉渐变
wp.style.backgroundImage = `url(${Store.data.wallpaper})`;
wp.style.backgroundSize = “cover”;
wp.style.backgroundPosition = “center”;
} else {
wp.classList.remove(“has-img”);
wp.style.backgroundImage = “”;
wp.style.background = t.wallpaper;
}
wp.style.filter = brightness !== 100 ? `brightness(${brightness}%)` : “”;

// 应用自定义CSS
applyCustomCSS();

// 暴露给JS用
window._currentTheme = t;
}

// 应用用户自定义CSS片段
function applyCustomCSS() {
let styleEl = document.getElementById(“user-custom-css”);
if (!styleEl) {
styleEl = document.createElement(“style”);
styleEl.id = “user-custom-css”;
document.head.appendChild(styleEl);
}
let bubbleEl = document.getElementById(“user-bubble-css”);
if (!bubbleEl) {
bubbleEl = document.createElement(“style”);
bubbleEl.id = “user-bubble-css”;
document.head.appendChild(bubbleEl);
}
styleEl.textContent = Store.data.appearance?.customCSS || “”;
bubbleEl.textContent = Store.data.appearance?.bubbleCSS || “”;
}

// 实时预览(打字过程中即时应用,不等保存)
function applyCustomCSS_preview(text, kind) {
const id = kind === “bubble” ? “user-bubble-css” : “user-custom-css”;
let el = document.getElementById(id);
if (!el) {
el = document.createElement(“style”);
el.id = id;
document.head.appendChild(el);
}
el.textContent = text || “”;
}

function getIconGradient(idx) {
const colors = BASE_THEME.iconColors[idx % BASE_THEME.iconColors.length];
return `linear-gradient(135deg, ${colors[0]} 0%, ${colors[1]} 100%)`;
}

function renderAvatar(opts={}) {
const { name=”?”, avatar, size=“md”, color } = opts;
const el = h(“div”, {class:`avatar ${size}`});
if (avatar) { el.style.backgroundImage = `url(${avatar})`; el.style.backgroundColor = “transparent”; }
else {

function isColorDark(hex) {
if (!hex || !hex.startsWith(”#”)) return false;
const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
return (r * 0.299 + g * 0.587 + b * 0.114) < 128;
}

function computeStats() {
let convs = 0, msgs = 0, userMsgs = 0, aiMsgs = 0, tokens = 0, activeConvs = 0;
for (const c of Store.data.conversations) {
convs++;
if (c.messages && c.messages.length > 0) activeConvs++;
for (const m of (c.messages || [])) {
msgs++;
if (m.role === “user”) userMsgs++;
else if (m.role === “assistant”) aiMsgs++;
if (m.tokens && m.tokens.total) tokens += m.tokens.total;
}
}
return { convs, msgs, userMsgs, aiMsgs, tokens, activeConvs };
}

function formatNum(n) {

return (n/1000000).toFixed(1) + “M”;

function fmtJournalTime(ts) {
if (!ts) return “”;
const d = new Date(ts);
const now = new Date();
if (d.toDateString() === now.toDateString()) return “今天 “ + d.toTimeString().slice(0, 5);
const yest = new Date(now); yest.setDate(now.getDate() - 1);
if (d.toDateString() === yest.toDateString()) return “昨天 “ + d.toTimeString().slice(0, 5);
if (now.getFullYear() === d.getFullYear()) return `${d.getMonth()+1}月${d.getDate()}日`;
return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}

function fmtMomentTime(ts) {
if (!ts) return “”;
const now = Date.now();
const diff = now - ts;
if (diff < 60 * 1000) return “刚刚”;
if (diff < 3600 * 1000) return Math.floor(diff / 60000) + “ 分钟前”;
if (diff < 24 * 3600 * 1000) return Math.floor(diff / 3600000) + “ 小时前”;
if (diff < 7 * 24 * 3600 * 1000) return Math.floor(diff / 86400000) + “ 天前”;
const d = new Date(ts);
return `${d.getMonth()+1}月${d.getDate()}日`;
}

async function triggerAIComments(momentId, isRetry = false) {
const m = (Store.data.moments || []).find(x => x.id === momentId);
if (!m) return;

// 重试时清空旧评论
if (isRetry) m.comments = [];
if (!m.comments) m.comments = [];

// 找出所有有默认通道+模型的助手
const eligibleAssts = (Store.data.assistants || []).filter(a => a.defaultChannelId && a.defaultModel);
if (eligibleAssts.length === 0) {
toast(“没有助手配置了默认模型,无法生成评论”);
return;
}

// 先放placeholder
const pendingMap = {};
for (const asst of eligibleAssts) {
const p = { id: uid(), assistantId: asst.id, content: “”, pending: true, createdAt: Date.now() };
m.comments.push(p);
pendingMap[asst.id] = p;
}
Store.save();
// 如果当前在动态详情或朋友圈,刷新
const top = Router.stack[Router.stack.length - 1];
if (top === “chat” || (typeof top === “object” && top.view === “moment-detail”)) render();

// 异步生成各个评论
for (const asst of eligibleAssts) {
generateMomentComment(asst, m, pendingMap[asst.id]).catch(err => {
const c = pendingMap[asst.id];
c.pending = false;
c.error = true;
c.content = “评论生成失败:” + (err.message || String(err));
Store.save();
});
}
}

function daysFromNow(dateStr) {
if (!dateStr) return 0;
const target = new Date(dateStr + “T00:00:00”);
const now = new Date();
now.setHours(0, 0, 0, 0);
return Math.round((target - now) / 86400000);
}

function showMemorySuggestModal(suggestions) {

const checkbox = h(“div”, {class:“sugg-checkbox checked”});
checkbox.addEventListener(“click”, (e) => {
e.stopPropagation();
if (checkbox.classList.contains(“checked”)) {
checkbox.classList.remove(“checked”);
selected.delete(text);
} else {
checkbox.classList.add(“checked”);
selected.add(text);
}
});
item.appendChild(checkbox);
const textInput = h(“div”, {style:{flex:1,minWidth:0}}, text);
textInput.contentEditable = “true”;
textInput.style.outline = “none”;
textInput.addEventListener(“input”, () => {
// 更新 selected 中的内容
selected.delete(text);
const newText = textInput.textContent.trim();
if (newText) selected.add(newText);
});
item.appendChild(textInput);
b.appendChild(item);
}
}, actions: [
{label:“取消”, onClick: c => c()},

added++;
}
}

function getTodayWeather() {
const today = new Date().toISOString().slice(0, 10);
if (!Store.data.weather) Store.data.weather = {currentText:””, currentDate:””, custom:[]};
if (Store.data.weather.currentDate === today && Store.data.weather.currentText) {
return Store.data.weather.currentText;
}
return refreshWeather(false);
}

function refreshWeather(forceNew) {
if (!Store.data.weather) Store.data.weather = {currentText:””, currentDate:””, custom:[]};
const today = new Date().toISOString().slice(0, 10);
const pool = […WEATHER_POOL, …(Store.data.weather.custom || [])];
let text;
if (forceNew && Store.data.weather.currentText) {
// 排除当前的,随机一个新的
const others = pool.filter(x => x !== Store.data.weather.currentText);
text = others[Math.floor(Math.random() * others.length)] || pool[0];
} else {
// 用日期作种子,每天稳定但不同
const seed = today.split(”-”).reduce((a,b) => a + parseInt(b), 0) + (forceNew ? Date.now() : 0);
text = pool[seed % pool.length];
}
Store.data.weather.currentText = text;
Store.data.weather.currentDate = today;
Store.save();
return text;
}

function todayStr() {

function ensurePushState() {
if (!Store.data.pushState) {
Store.data.pushState = {lastMorningDate:””, lastNightDate:””, lastMomentNudgeDate:””, dismissedToday:[]};
}
// 跨天清理 dismissedToday
const ps = Store.data.pushState;
if (ps._dismissDate !== todayStr()) {
ps.dismissedToday = [];
ps._dismissDate = todayStr();
}
return ps;
}

function pickRandomAssistant() {
const eligible = (Store.data.assistants || []).filter(a => a.systemPrompt || a.name);
if (eligible.length === 0) return null;
return eligible[Math.floor(Math.random() * eligible.length)];
}

function pickFromArr(arr) {
return arr[Math.floor(Math.random() * arr.length)];
}

function computeActivePushes() {
const ps = ensurePushState();
const today = todayStr();
const now = new Date();
const hour = now.getHours();
const pushes = [];

// 早安(8-11点首次)
if (hour >= 8 && hour < 11 && ps.lastMorningDate !== today && !ps.dismissedToday.includes(“morning”)) {
const asst = pickRandomAssistant();
pushes.push({
id: “morning”,
icon: “🌅”,
avatar: asst?.avatar,
title: (asst?.name || “助手”) + “ · 早安”,
text: pickFromArr(MORNING_LINES),
onClick: () => { ps.lastMorningDate = today; Store.save(); render(); }
});
ps.lastMorningDate = today;
Store.save();
}

// 晚安(23点后或0-3点)
const isLateNight = hour >= 23 || hour < 3;
if (isLateNight && ps.lastNightDate !== today && !ps.dismissedToday.includes(“night”)) {
const asst = pickRandomAssistant();
pushes.push({
id: “night”,
icon: “🌙”,
avatar: asst?.avatar,
title: (asst?.name || “助手”) + “ · 晚安”,
text: pickFromArr(NIGHT_LINES),
onClick: () => { ps.lastNightDate = today; Store.save(); render(); }
});
ps.lastNightDate = today;
Store.save();
}

// 倒数日临近(3天/1天/今天)
for (const c of (Store.data.countdowns || [])) {
const days = daysFromNow(c.date);
if (![0, 1, 3].includes(days)) continue;
const pid = “countdown-” + c.id + “-” + days;
if (ps.dismissedToday.includes(pid)) continue;
let text;
if (days === 0) text = `今天就是「${c.title}」啦!`;
else if (days === 1) text = `还有 1 天就是「${c.title}」了。`;
else text = `「${c.title}」还有 3 天。`;
pushes.push({
id: pid,
icon: c.emoji || “📅”,
title: “倒数日提醒”,
text,
onClick: () => Router.go(“countdowns”)
});
}

// 朋友圈3天没发
const moments = Store.data.moments || [];
if (moments.length > 0 && ps.lastMomentNudgeDate !== today && !ps.dismissedToday.includes(“moment-nudge”)) {
const lastMoment = […moments].sort((a,b) => (b.createdAt||0) - (a.createdAt||0))[0];
const daysSince = (Date.now() - (lastMoment.createdAt || 0)) / 86400000;
if (daysSince >= 3) {
const asst = pickRandomAssistant();
pushes.push({
id: “moment-nudge”,
icon: “🌸”,
avatar: asst?.avatar,
title: (asst?.name || “助手”) + “ · 想你”,
text: pickFromArr(MOMENT_NUDGE),
onClick: () => {
ps.lastMomentNudgeDate = today;
Store.save();
chatActiveTab = “moments”;
Router.go(“chat”);
}
});
}
}

return pushes;
}

function cleanOldDoneTodos() {
if (!Store.data.todos) return;
const today = todayStr();
const before = Store.data.todos.length;
Store.data.todos = Store.data.todos.filter(t => {

});

}

));
// 鼓励文字
let subText;
if (todayCount === 0) subText = “今天还没喝水呢,先来一杯?”;
else if (todayCount < goal / 2) subText = “继续加油,身体在等着你呀”;
else if (todayCount < goal) subText = “已经过半啦,差一点点!”;

const days = [];
for (let i = 0; i < 7; i++) {

d.setDate(d.getDate() - i);
const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;

async function doDreamInterp(dream, assistant) {
const ch = Store.data.channels.find(c => c.id === assistant.defaultChannelId);
if (!ch || !ch.apiKey) { toast(“通道未配置”); return; }

const loadingToast = document.createElement(“div”);
loadingToast.className = “bg-task-toast”;
loadingToast.innerHTML = `<div class="bg-task-icon">🌙</div><div class="bg-task-content"><div class="bg-task-title">${assistant.name} 在解梦</div><div class="bg-task-sub">梦境分析中...</div></div>`;
document.body.appendChild(loadingToast);

const sysPrompt = (assistant.systemPrompt || “”) + buildMemoryPromptText() +
“\n\n现在用户分享了一个梦,请你用温柔的语气、贴合你的人设,对这个梦做一段轻松的解读。规则:\n- 不超过 6 句话\n- 偏暗示和情绪解读,不要太迷信占卜的腔调\n- 可以联系用户已有的状态\n- 不要写’解梦:’之类前缀,直接是解读本身”;

const userMsg = `梦境内容:\n${dream.content}\n\n${dream.vibe ? `氛围:${dream.vibe}\n`: ""}${dream.keywords?.length ?`关键词:${dream.keywords.join(”、”)}` : ""}\n\n请帮我解读一下这个梦。`;

try {
let collected = “”;
await callChannel({
channel: ch, model: assistant.defaultModel,
systemPrompt: sysPrompt,
messages: [{role:“user”, content: userMsg}],
temperature: 0.85,
signal: new AbortController().signal,
onDelta: (chunk) => { collected += chunk; },
onUsage: () => {}
});
loadingToast.remove();
dream.aiInterp = collected.trim();
dream.assistantId = assistant.id;
Store.save();
render();
toast(“✨ 解读完成”);
} catch (err) {
loadingToast.remove();
toast(“解读失败:” + (err.message || String(err)));
}
}

function getAllModels() {
const out = [];
for (const ch of Store.data.channels) {
if (!ch.apiKey) continue;
const models = ch.models || [];
for (const m of models) {
out.push({channelId: ch.id, model: m.id, label: m.name || m.id, custom: false});

out.push({channelId: ch.id, model: m.trim(), label: m.trim(), custom: true});
}
}
}
return out;
}

/* ===================== Channel 调用 ===================== */
async function callChannel({channel, model, systemPrompt, messages, temperature, signal, onDelta, onUsage}) {
if (channel.protocol === “anthropic”) {
return callAnthropic({channel, model, systemPrompt, messages, temperature, signal, onDelta, onUsage});
}
return callOpenAICompatible({channel, model, systemPrompt, messages, temperature, signal, onDelta, onUsage});
}

async function callOpenAICompatible({channel, model, systemPrompt, messages, temperature, signal, onDelta, onUsage}) {
const url = channel.baseUrl.replace(//$/, “”) + “/chat/completions”;
const body = {
model,
messages: […(systemPrompt ? [{role:“system”, content: systemPrompt}] : []), …messages],
temperature, stream: true,
stream_options: { include_usage: true }
};
if (model.startsWith(“o1”) || model.startsWith(“o3”)) delete body.temperature;
const res = await fetch(url, {
method:“POST”,
headers:{“Content-Type”:“application/json”, “Authorization”:`Bearer ${channel.apiKey}`},
body: JSON.stringify(body), signal
});
if (!res.ok) {
const t = await res.text();
throw new Error(`HTTP ${res.status}: ${t.slice(0, 300)}`);
}
await readSSE(res, (data) => {
if (data === “[DONE]”) return;
let j; try { j = JSON.parse(data); } catch { return; }
const delta = j.choices?.[0]?.delta?.content;
if (delta) onDelta(delta);
if (j.usage) onUsage({input: j.usage.prompt_tokens, output: j.usage.completion_tokens, total: j.usage.total_tokens});
});
}

async function callAnthropic({channel, model, systemPrompt, messages, temperature, signal, onDelta, onUsage}) {
const url = channel.baseUrl.replace(//$/, “”) + “/messages”;
const cleanMsgs = messages.filter(m => m.role === “user” || m.role === “assistant”);
while (cleanMsgs.length && cleanMsgs[0].role !== “user”) cleanMsgs.shift();
const body = {
model, max_tokens: 4096,
messages: cleanMsgs, temperature, stream: true
};
if (systemPrompt) body.system = systemPrompt;
const res = await fetch(url, {
method:“POST”,
headers:{
“Content-Type”:“application/json”,
“x-api-key”: channel.apiKey,
“anthropic-version”:“2023-06-01”,
“anthropic-dangerous-direct-browser-access”:“true”
},
body: JSON.stringify(body), signal
});
if (!res.ok) {
const t = await res.text();
throw new Error(`HTTP ${res.status}: ${t.slice(0, 300)}`);
}
let inputTokens = 0, outputTokens = 0;
await readSSE(res, (data) => {
let j; try { j = JSON.parse(data); } catch { return; }
if (j.type === “content_block_delta” && j.delta?.text) onDelta(j.delta.text);
else if (j.type === “message_start” && j.message?.usage) inputTokens = j.message.usage.input_tokens || 0;
else if (j.type === “message_delta” && j.usage) outputTokens = j.usage.output_tokens || outputTokens;
});
if (inputTokens || outputTokens) onUsage({input: inputTokens, output: outputTokens, total: inputTokens + outputTokens});
}

async function readSSE(res, onData) {
const reader = res.body.getReader();
const dec = new TextDecoder();
let buf = “”;
while (true) {
const { value, done } = await reader.read();
if (done) break;
buf += dec.decode(value, {stream: true});
const lines = buf.split(”\n”);
buf = lines.pop();
for (const line of lines) {
const t = line.trim();
if (!t) continue;
if (t.startsWith(“data:”)) onData(t.slice(5).trim());
}
}
if (buf.trim().startsWith(“data:”)) onData(buf.trim().slice(5).trim());
}

async function fetchModelsForChannel(channel) {
if (!channel.apiKey) throw new Error(“没有 API key”);
if (channel.protocol === “anthropic”) {
const url = channel.baseUrl.replace(//$/, “”) + “/models”;
const res = await fetch(url, {
headers: {
“x-api-key”: channel.apiKey,
“anthropic-version”:“2023-06-01”,
“anthropic-dangerous-direct-browser-access”:“true”
}
});
if (!res.ok) throw new Error(`HTTP ${res.status}`);
const j = await res.json();
return (j.data || []).map(m => ({id: m.id, name: m.display_name || m.id}));
}
// OpenAI compatible
const url = channel.baseUrl.replace(//$/, “”) + “/models”;
const res = await fetch(url, {
headers: {“Authorization”: `Bearer ${channel.apiKey}`}
});
if (!res.ok) throw new Error(`HTTP ${res.status}`);
const j = await res.json();
return (j.data || []).map(m => ({id: m.id, name: m.id})).filter(m => {
// 过滤掉非chat模型(常见命名特征)
const id = m.id.toLowerCase();
if (id.includes(“embed”) || id.includes(“whisper”) || id.includes(“tts”) || id.includes(“dall-e”) || id.includes(“moderation”) || id.includes(“audio”) || id.includes(“realtime”) || id.includes(“transcribe”)) return false;
return true;
});
}

function itemRow({icon, label, sub, right, onClick, danger}) {

if (sub) main.appendChild(h(“div”, {class:“li-sub”}, sub));
item.appendChild(main);

async function fileToDataURL(file, maxSize=512) {
return new Promise((res, rej) => {
const reader = new FileReader();
reader.onload = () => {
const img = new Image();
img.onload = () => {
let { width, height } = img;
if (width > maxSize || height > maxSize) {
if (width > height) { height = height * maxSize / width; width = maxSize; }
else { width = width * maxSize / height; height = maxSize; }
}
const c = document.createElement(“canvas”);
c.width = width; c.height = height;
c.getContext(“2d”).drawImage(img, 0, 0, width, height);
res(c.toDataURL(“image/jpeg”, 0.85));
};
img.onerror = rej;
img.src = reader.result;
};
reader.onerror = rej;
reader.readAsDataURL(file);
});
}

body.appendChild(h(“div”, {style:{height:24}}));
body.appendChild(h(“button”, {class:“btn-danger btn-block”, onClick: async () => {
const ok = await confirm({title:“删除通道”, message:`删除「${ch.name}」?对话不会受影响,但需要重新选模型。`, danger:true, confirmLabel:“删除”});
if (ok) { Store.data.channels = Store.data.channels.filter(x => x.id !== ch.id); Store.save(); Router.back(); }
}}, “删除此通道”));
body.appendChild(h(“div”, {style:{height:32}}));
s.appendChild(body);
return s;
}

/* ===================== 助手 ===================== */
function renderAssistants() {
const s = h(“div”, {class:“screen app-screen”});
const addBtn = h(“button”, {class:“btn-icon”, onClick: () => {
const a = { id: uid(), name:“新助手”, avatar:null, systemPrompt:””, defaultChannelId: Store.data.settings.lastChannelId || (Store.data.channels[0]?.id) || null, defaultModel: Store.data.settings.lastModel || “”, temperature: 0.7, note:””, createdAt: Date.now() };
Store.data.assistants.push(a); Store.save(); Router.go(“assistant-edit”, {id: a.id});
}}, h(“span”, {html: ‘<svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>’}));
s.appendChild(pageHeader({title:“助手”, right: addBtn}));
const body = h(“div”, {class:“page-body”});
body.appendChild(h(“div”, {class:“help-text”}, “助手 = 一个预设的人设(系统提示词 + 默认模型 + 头像)。新建对话时选一个助手开始。”));
const list = h(“div”, {class:“list”});
for (const a of Store.data.assistants) {
list.appendChild(h(“div”, {class:“list-item”, onClick: () => Router.go(“assistant-edit”, {id: a.id})},
renderAvatar({name: a.name, avatar: a.avatar, size:“md”}),
h(“div”, {class:“li-main”}, a.name, h(“div”, {class:“li-sub”}, a.note || (a.systemPrompt && a.systemPrompt.slice(0,40)) || “无提示词”)),
h(“div”, {class:“li-right”}, h(“span”, {class:“arrow”}, “›”))
));
}
body.appendChild(list);
s.appendChild(body);
return s;
}

function renderAssistantEdit(opts) {
const a = Store.data.assistants.find(x => x.id === opts?.id);
if (!a) { Router.back(); return h(“div”); }
const s = h(“div”, {class:“screen app-screen”});
s.appendChild(pageHeader({title:“编辑助手”}));
const body = h(“div”, {class:“page-body”});

// 头像
const avBox = h(“div”, {style:{padding:“20px 16px”,textAlign:“center”}});
avBox.appendChild(renderAvatar({name: a.name, avatar: a.avatar, size:“xl”}));
const fileInput = h(“input”, {type:“file”, accept:“image/*”, style:{display:“none”}});
fileInput.addEventListener(“change”, async (e) => {
const f = e.target.files[0]; if (!f) return;
a.avatar = await fileToDataURL(f, 256); Store.save(); render();
});
const btns = h(“div”, {style:{display:“flex”,gap:8,justifyContent:“center”,marginTop:12}},
h(“button”, {class:“btn-secondary”, onClick: () => fileInput.click()}, “📷 上传头像”),
a.avatar ? h(“button”, {class:“btn-danger”, onClick: () => { a.avatar = null; Store.save(); render(); }}, “清除”) : null
);
avBox.appendChild(btns);
avBox.appendChild(fileInput);
body.appendChild(avBox);

body.appendChild(h(“div”, {class:“section”}, “基本信息”));
const list1 = h(“div”, {class:“input-block”});
const nameRow = h(“div”, {class:“input-row”}, h(“label”, {}, “名称”), h(“input”, {type:“text”, value: a.name||””, placeholder:“我的助手”}));
nameRow.querySelector(“input”).addEventListener(“change”, e => { a.name = e.target.value.trim() || “未命名”; Store.save(); });
list1.appendChild(nameRow);
const noteRow = h(“div”, {class:“input-row”}, h(“label”, {}, “备注”), h(“input”, {type:“text”, value: a.note||””, placeholder:“给自己看的备注”}));
noteRow.querySelector(“input”).addEventListener(“change”, e => { a.note = e.target.value; Store.save(); });
list1.appendChild(noteRow);
body.appendChild(list1);

body.appendChild(h(“div”, {class:“section”}, “系统提示词”));
const sp = h(“div”, {class:“input-block”});
const spRow = h(“div”, {class:“input-row”},
h(“label”, {id:“sp-len-label”}, `${(a.systemPrompt||"").length} 字`),
h(“textarea”, {rows:8, placeholder:“在这里写人设、说话风格、规则…\n例如: 你是温柔耐心的学习助手,用中文回答,讲解力求通俗易懂。”, value: a.systemPrompt||””})
);
const ta = spRow.querySelector(“textarea”);
const lenLabel = spRow.querySelector(”#sp-len-label”);
ta.addEventListener(“input”, () => { a.systemPrompt = ta.value; lenLabel.textContent = `${ta.value.length} 字`; });
ta.addEventListener(“change”, () => Store.save());
sp.appendChild(spRow);
body.appendChild(sp);

body.appendChild(h(“div”, {class:“section”}, “默认参数”));
const list2 = h(“div”, {class:“list”});
const all = getAllModels();
const cur = all.find(m => m.channelId === a.defaultChannelId && m.model === a.defaultModel);
const ch = Store.data.channels.find(c => c.id === a.defaultChannelId);
list2.appendChild(itemRow({
icon:“🤖”, label:“默认模型”,
sub: cur ? `${ch?.emoji||""} ${ch?.name} · ${cur.label}` : “未选择”,
onClick: () => {
modal({title:“选择默认模型”, body: (b, close) => {
if (all.length === 0) {
b.appendChild(h(“div”, {class:“empty”}, h(“div”, {class:“empty-icon”}, “📭”), h(“div”, {}, “还没有任何模型”), h(“div”, {style:{marginTop:8,fontSize:13}}, “去添加 API 通道”)));
return;
}
const groups = {};
for (const m of all) { if (!groups[m.channelId]) groups[m.channelId] = []; groups[m.channelId].push(m); }
for (const cid of Object.keys(groups)) {
const cch = Store.data.channels.find(x => x.id === cid);
if (!cch) continue;
b.appendChild(h(“div”, {style:{padding:“10px 18px 4px”,fontSize:12,color:“var(–text-soft)”,fontWeight:600}}, `${cch.emoji||"🤖"} ${cch.name}`));
const list = h(“div”, {class:“list”, style:{margin:“0 0 4px”}});
for (const m of groups[cid]) {
const active = m.channelId === a.defaultChannelId && m.model === a.defaultModel;
list.appendChild(h(“div”, {class:“list-item”, onClick: () => {
a.defaultChannelId = m.channelId; a.defaultModel = m.model; Store.save(); close(); render();
}},
h(“div”, {class:“li-main”}, m.label, m.custom ? h(“div”, {class:“li-sub”}, “自定义”) : null),
active ? h(“div”, {class:“li-right”, style:{color:“var(–primary-deep)”}}, “✓”) : null
));
}
b.appendChild(list);
}
}});
}
}));
list2.appendChild(itemRow({
icon:“🌡”, label:“默认温度”, sub:(a.temperature ?? 0.7).toFixed(2),
onClick: () => {
let v = a.temperature ?? 0.7;
modal({size:“center”, title:“默认温度”,
body: (b) => {
const display = h(“div”, {style:{textAlign:“center”,fontSize:36,fontWeight:700,color:“var(–primary-deep)”,padding:“12px 0”}}, v.toFixed(2));
b.appendChild(display);
const r = h(“input”, {type:“range”, min:0, max:2, step:0.05, value:v});
r.addEventListener(“input”, () => { v = parseFloat(r.value); display.textContent = v.toFixed(2); });
b.appendChild(r);
b.appendChild(h(“div”, {style:{display:“flex”,justifyContent:“space-between”,fontSize:11,color:“var(–text-mute)”,marginTop:8}},
h(“span”, {}, “严谨 0”), h(“span”, {}, “平衡 1”), h(“span”, {}, “放飞 2”)));
},
actions: [
{label:“取消”, onClick: c => c()},
{label:“保存”, primary:true, onClick: c => { a.temperature = v; Store.save(); c(); render(); }}
]
});
}
}));
body.appendChild(list2);

body.appendChild(h(“div”, {style:{height:16}}));
if (Store.data.assistants.length > 1) {
body.appendChild(h(“button”, {class:“btn-danger btn-block”, onClick: async () => {
const ok = await confirm({title:“删除助手”, message:`删除「${a.name}」?使用此助手的对话不会被删除,但会回退到第一个助手。`, danger:true, confirmLabel:“删除”});
if (ok) {
Store.data.assistants = Store.data.assistants.filter(x => x.id !== a.id);
for (const c of Store.data.conversations) if (c.assistantId === a.id) c.assistantId = Store.data.assistants[0].id;
Store.save(); Router.back();
}
}}, “删除助手”));
}
body.appendChild(h(“div”, {style:{height:32}}));
s.appendChild(body);
return s;
}

/* ===================== 导入导出 ===================== */
function exportData() {
const blob = new Blob([JSON.stringify(Store.data, null, 2)], {type:“application/json”});
const url = URL.createObjectURL(blob);
const a = document.createElement(“a”);
a.href = url; a.download = `snowball-backup-${new Date().toISOString().slice(0,10)}.json`;
a.click(); URL.revokeObjectURL(url); toast(“已导出”);
}

function importData() {
const f = h(“input”, {type:“file”, accept:”.json,application/json”, style:{display:“none”}});
f.addEventListener(“change”, async e => {
const file = e.target.files[0]; if (!file) return;
try {
const txt = await file.text();
const data = JSON.parse(txt);
const ok = await confirm({title:“导入数据”, message:“会覆盖当前所有数据(对话、设置、API 通道)。确定继续?”, danger:true, confirmLabel:“导入并覆盖”});
if (ok) { Store.data = data; Store.save(); applyTheme(); Router.reset(); toast(“导入成功”); }
} catch (err) { toast(“文件格式错误: “ + err.message); }
});
document.body.appendChild(f); f.click(); setTimeout(() => f.remove(), 1000);
}

/* ===================== 时钟 ===================== */
function tickStatusbarClock() {
const d = new Date();
$(”#sb-time”).textContent = `${d.getHours()}:${d.getMinutes().toString().padStart(2,"0")}`;
}

/* ===================== 启动 ===================== */
Store.load();
applyTheme();
render();
tickStatusbarClock(); setInterval(tickStatusbarClock, 30000);

window.addEventListener(“popstate”, () => { Router.back(); });
document.addEventListener(“gesturestart”, e => e.preventDefault());

</script>
</body>
</html>
